<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .secondary-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            text-align: center;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #message.show {
            display: block;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .config {
            margin-top: 30px;
            padding: 20px;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 12px;
            font-size: 13px;
        }
        
        .config strong {
            color: #856404;
        }
        
        .config code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Clipboard Sync</h1>
        <p class="subtitle">Share clipboard between your devices</p>
        
        <textarea id="clipboardText" placeholder="Paste or type text here..."></textarea>
        
        <button onclick="sendToComputer()" id="sendBtn">
            📤 Send to Computer
        </button>
        
        <div class="button-group">
            <button onclick="getFromComputer()" id="getBtn" class="secondary-btn">
                📥 Get Latest
            </button>
            
            <button onclick="showHistory()" id="historyBtn" class="secondary-btn">
                📜 History
            </button>
        </div>
        
        <div id="message"></div>
        
        <div class="config">
            <strong>⚙️ Setup:</strong><br>
            1. Update <code>API_KEY</code> in this file<br>
            2. Match it with <code>application.properties</code>
        </div>
    </div>

    <script>
        // ⚠️ CHANGE THIS to match your application.properties app.api.key
        const API_KEY = '3397d4fef73306c1d06a03944d9f773305b03fbf56c0d334464cde2e47ce18eb';
        
        // Automatically detects if running locally or on cloud
        const SERVER_URL = window.location.origin + '/api';
        
        // Check if Clipboard API is available
        const hasClipboardAPI = navigator.clipboard && window.isSecureContext;
        
        if (!hasClipboardAPI) {
            showMessage('ℹ️ Using manual mode (clipboard API not available over HTTP)', 'info');
        }
        
        async function sendToComputer() {
            const btn = document.getElementById('sendBtn');
            const textarea = document.getElementById('clipboardText');
            
            btn.disabled = true;
            btn.textContent = '⏳ Sending...';
            
            try {
                const text = textarea.value;
                
                if (!text || !text.trim()) {
                    showMessage('Please enter some text!', 'error');
                    return;
                }
                
                // Send to server
                const response = await fetch(`${SERVER_URL}/copy`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({ content: text })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showMessage(`✅ Sent to computer! (ID: ${data.id})`, 'success');
                    
                    // Try to copy to clipboard if available
                    if (hasClipboardAPI) {
                        try {
                            await navigator.clipboard.writeText(text);
                        } catch (e) {
                            // Ignore - clipboard write might fail
                        }
                    }
                } else if (response.status === 401) {
                    showMessage('❌ Invalid API key! Check configuration.', 'error');
                } else {
                    showMessage(`❌ Failed to send (${response.status})`, 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 Send to Computer';
            }
        }
        
        async function getFromComputer() {
            const btn = document.getElementById('getBtn');
            const textarea = document.getElementById('clipboardText');
            
            btn.disabled = true;
            btn.textContent = '⏳ Loading...';
            
            try {
                const response = await fetch(`${SERVER_URL}/latest`, {
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });
                
                if (response.status === 204) {
                    showMessage('ℹ️ No clipboard items on server yet', 'info');
                    return;
                }
                
                if (response.status === 401) {
                    showMessage('❌ Invalid API key! Check configuration.', 'error');
                    return;
                }
                
                if (!response.ok) {
                    showMessage(`❌ Failed to fetch (${response.status})`, 'error');
                    return;
                }
                
                const data = await response.json();
                
                // Show in textarea
                textarea.value = data.content;
                
                // Try to copy to clipboard if available
                if (hasClipboardAPI) {
                    try {
                        await navigator.clipboard.writeText(data.content);
                        showMessage(`✅ Copied from computer! (ID: ${data.id})`, 'success');
                    } catch (e) {
                        showMessage(`✅ Loaded from computer! (ID: ${data.id}) - Long press to copy`, 'success');
                    }
                } else {
                    showMessage(`✅ Loaded from computer! (ID: ${data.id}) - Long press to copy`, 'success');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '📥 Get Latest';
            }
        }
        
        async function showHistory() {
            const btn = document.getElementById('historyBtn');
            const textarea = document.getElementById('clipboardText');
            
            btn.disabled = true;
            btn.textContent = '⏳ Loading...';
            
            try {
                const response = await fetch(`${SERVER_URL}/history`, {
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });
                
                if (response.status === 401) {
                    showMessage('❌ Invalid API key! Check configuration.', 'error');
                    return;
                }
                
                if (!response.ok) {
                    showMessage(`❌ Failed to fetch history (${response.status})`, 'error');
                    return;
                }
                
                const items = await response.json();
                
                if (items.length === 0) {
                    showMessage('ℹ️ No clipboard history yet', 'info');
                    return;
                }
                
                // Format history for display
                const historyText = items.map((item, index) => 
                    `[${index + 1}] ${new Date(item.timestamp).toLocaleString()}\n${item.content}`
                ).join('\n\n' + '='.repeat(50) + '\n\n');
                
                textarea.value = historyText;
                showMessage(`✅ Showing ${items.length} clipboard items`, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '📜 History';
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `${type} show`;
            
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }
        
        // Test server connection on load
        fetch(`${SERVER_URL}/health`)
            .then(response => response.json())
            .then(data => {
                console.log('✅ Server connected:', data);
            })
            .catch(error => {
                console.error('❌ Server connection failed:', error);
                showMessage('⚠️ Cannot connect to server. Is it running?', 'error');
            });
    </script>
</body>
</html>
